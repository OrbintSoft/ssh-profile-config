name: Linting
on: [push]
jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          # ssh-init-macos.sh is zsh, which ShellCheck cannot parse (SC1071).
          ignore_names: ssh-init-macos.sh
      - uses: reviewdog/action-shfmt@v1
