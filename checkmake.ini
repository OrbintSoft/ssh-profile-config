# checkmake configuration. Rules: https://github.com/checkmake/checkmake
[minphony]
# "all"/"test"/"clean" are not all meaningful yet (no build or test stage in the
# bash phase); revisit once those targets exist.
disabled = true

[maxbodylength]
# Install/uninstall legitimately run several steps with progress echoes.
maxBodyLength = 20
